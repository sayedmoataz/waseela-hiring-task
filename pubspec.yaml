name: waseela
description: "A new Flutter project."
publish_to: 'none' 

version: 1.0.0+1
environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # State Management & Dependency Injection
  flutter_bloc: ^8.1.3
  get_it: ^7.6.4
  injectable: ^2.3.2
  dartz: ^0.10.1
  # --- Model Utilities ---
  equatable: ^2.0.5
  # --- Networking & API ---
  dio: ^5.3.3
  pretty_dio_logger: ^1.3.1
  internet_connection_checker: ^1.0.0+1
  # --- Local Storage & Device Info ---
  flutter_secure_storage: ^9.0.0
  path_provider: ^2.1.1
  # --- Security & Database ---
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  local_auth: ^3.0.1
  local_auth_android: ^2.0.5
  local_auth_ios: ^1.1.7
  flutter_dotenv: ^6.0.0
  # --- UI & Localization & Responsiveness ---
  advanced_responsive: ^1.0.3
  # --- Utils & Tools ---
  performance_monitor: ^1.1.2
  shimmer: ^3.0.0
  cached_network_image: ^3.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  # --- Generators ---
  build_runner: ^2.4.7
  hive_generator: ^2.0.1
  injectable_generator: ^2.4.1
  # --- Testing ---
  mockito: ^5.4.4
  mocktail: ^1.0.4
  bloc_test: ^9.1.7


flutter:
  uses-material-design: true
  assets:
    - .env
